name: Create release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Validate branch
        run: |
          if [[ "${{ github.ref_name }}" != "develop" ]]; then
            echo "::error::This workflow must be run on the develop branch."
            exit 1
          fi

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout develop
        uses: actions/checkout@v6.0.2
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "22"

      - name: Configure git
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          APP_SLUG="${{ steps.app-token.outputs.app-slug }}"
          APP_USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

      - name: Resolve version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          NUMERIC_VERSION=${CURRENT_VERSION%-SNAPSHOT}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$NUMERIC_VERSION"
          NEXT_VERSION="${MAJOR}.$((MINOR + 1)).0"
          echo "NUMERIC_VERSION=$NUMERIC_VERSION" >> $GITHUB_ENV
          echo "RC_VERSION=${NUMERIC_VERSION}-RC-SNAPSHOT" >> $GITHUB_ENV
          echo "TAG_NAME=${NUMERIC_VERSION}" >> $GITHUB_ENV
          echo "NEXT_SNAPSHOT=${NEXT_VERSION}-SNAPSHOT" >> $GITHUB_ENV

      - name: Merge develop into main
        run: |
          git checkout main
          git pull origin main
          git merge develop --no-ff -m "release: merge develop into main for ${{ env.TAG_NAME }}"
          git push origin main

      - name: Set RC-SNAPSHOT version on main
        run: |
          npm pkg set version="${{ env.RC_VERSION }}"
          git add package.json
          git commit -m "release: set version ${{ env.RC_VERSION }}"
          git push origin main

      - name: Merge main back into develop and bump version
        run: |
          git checkout develop
          git merge main --no-ff -m "release: merge main back into develop after ${{ env.TAG_NAME }}"
          npm pkg set version="${{ env.NEXT_SNAPSHOT }}"
          git add package.json
          git commit -m "release: bump version to ${{ env.NEXT_SNAPSHOT }}"
          git push origin develop

      - name: Create release branch and finalize version
        run: |
          git checkout main
          git checkout -b release/${{ env.NUMERIC_VERSION }}
          npm pkg set version="${{ env.NUMERIC_VERSION }}"
          git add package.json
          git commit -m "release: set version ${{ env.NUMERIC_VERSION }}"

      - name: Tag and publish release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git tag ${{ env.TAG_NAME }}
          git push origin ${{ env.TAG_NAME }}
          gh release create ${{ env.TAG_NAME }} \
            --title "MoirAI ${{ env.NUMERIC_VERSION }}" \
            --generate-notes

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ vars.DOCKER_REPO_ADDR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        run: |
          docker build -t ${{ vars.DOCKER_REPO_ADDR }}/${{ vars.DOCKER_REPO }}/${{ vars.DOCKER_IMAGE_NAME }}:${{ env.NUMERIC_VERSION }} .
          docker push ${{ vars.DOCKER_REPO_ADDR }}/${{ vars.DOCKER_REPO }}/${{ vars.DOCKER_IMAGE_NAME }}:${{ env.NUMERIC_VERSION }}
